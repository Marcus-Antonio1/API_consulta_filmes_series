<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/home.css">
    <title>Filmes - MarkFilmes</title>
</head>
<body>
    <header class="cabecalho">
        <div class="cabecalho__logo">
            <img src="./img/logo.png" alt="Logo MarkFilmes">
            <select data-categorias>
                <option value="todos">Categorias</option>
                <option value="comedia">Comedia</option>
                <option value="acao">Acao</option>
                <option value="crime">Crime</option>
                <option value="drama">Drama</option>
                <option value="aventura">Aventura</option>
            </select>
        </div>

        <div class="cabecalho__busca">
            <div class="busca-wrapper">
                <input type="text" id="input-busca" placeholder="Buscar filme ou serie..." autocomplete="off">
                <button id="btn-busca" title="Buscar">
                    <span class="material-symbols-outlined">search</span>
                </button>
            </div>
            <div id="feedback-busca" class="feedback-busca" style="display:none"></div>
        </div>

        <div class="cabecalho__opcoes">
            <a href="index.html">Home</a>
            <a href="filmes.html">Filmes</a>
        </div>
    </header>

    <main>
        <section data-name="lancamentos" class="section">
            <h2>Filmes lançados recentemente no MarkFilmes</h2>
        </section>
        <section data-name="top5" class="section">
            <h2>Mais Populares</h2>
        </section>
        <section data-name="filmes" class="section">
            <h2>Todos os Filmes</h2>
        </section>
        <section data-name="categoria" class="hidden pesquisa">
            <h2>Filmes por Categoria</h2>
        </section>
    </main>

    <script src="./scripts/filmes.js" type="module"></script>
</body>
</html>
